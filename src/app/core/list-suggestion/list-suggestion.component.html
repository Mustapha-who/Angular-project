<div class="page">
  <h2 class="title">Liste des suggestions</h2>
  <button class="btn-add" [routerLink]="['/suggestions/add']">Ajouter une suggestion</button>

  <input
    class="search"
    type="text"
    placeholder="Rechercher une suggestion"
    [(ngModel)]="searchText"
  />

  <div class="layout">
    <div class="list">
      <div class="card" *ngFor="let s of filteredSuggestions()">
        <div class="card-header">
          <h3 class="card-title">{{ s.title }}</h3>
          <p class="meta">
            <span class="category">{{ s.category }}</span>
            <span class="dot">•</span>
            <span class="date">{{ s.date | date:'dd/MM/yyyy' }}</span>
          </p>
        </div>
        <p class="desc">{{ s.description }}</p>
        <div class="badges">
          <span class="badge accepted" *ngIf="s.status === 'acceptee'">ACCEPTÉE</span>
          <span class="badge refused"  *ngIf="s.status === 'refusee'">REFUSÉE</span>
          <span class="badge pending"  *ngIf="s.status === 'en_attente'">EN ATTENTE</span>
        </div>
        <div class="actions" *ngIf="s.status !== 'refusee'">
          <button class="btn btn-like" (click)="like(s)">👍 Like {{ s.nbLikes }}</button>
          <button class="btn btn-fav" (click)="addToFavorites(s)" [disabled]="isFavorite(s)">
            ⭐ {{ isFavorite(s) ? 'Déjà en favoris' : 'Ajouter aux favoris' }}
          </button>
          <button class="btn btn-detail" [routerLink]="['/suggestions/detail', s.id]">📄 Voir détails</button>
          <button class="btn btn-edit" (click)="openEditModal(s)">✏️ Modifier</button>
          <button class="btn btn-delete" (click)="deleteSuggestion(s)">🗑️ Supprimer</button>
        </div>
      </div>
    </div>

    <div class="favorites">
      <h4 class="fav-title">Favoris</h4>
      <p class="empty" *ngIf="favorites.length === 0">Aucune suggestion en favoris pour le moment.</p>
      <div class="fav-item" *ngFor="let f of favorites">
        <div class="fav-name">{{ f.title }}</div>
        <div class="fav-sub">{{ f.category }}</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">

    <h3>✏️ Modifier la suggestion</h3>

    <label>Titre</label>
    <input type="text" [(ngModel)]="editingSuggestion.title" placeholder="Titre" />

    <label>Description</label>
    <textarea [(ngModel)]="editingSuggestion.description" placeholder="Description" rows="4"></textarea>

    <label>Catégorie</label>
    <select [(ngModel)]="editingSuggestion.category">
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>

    <label>Statut</label>
    <select [(ngModel)]="editingSuggestion.status">
      <option value="pending">En attente</option>
      <option value="accepted">Acceptée</option>
      <option value="refused">Refusée</option>
    </select>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">Annuler</button>
      <button class="btn-save" (click)="saveEdit()">💾 Sauvegarder</button>
    </div>

  </div>
</div>
